<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Creative Corner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: #f9f7f4;
            color: #2c2c2c;
            line-height: 1.6;
            padding: 15px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        header {
            text-align: center;
            padding: 30px 15px;
            background: #2c3e50;
            color: white;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        h1 {
            font-size: 1.8rem;
            word-break: break-word;
        }
        header p {
            font-size: 0.9rem;
            margin-top: 8px;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        nav button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        nav button.active {
            background: #d35400;
            transform: scale(0.98);
        }
        .feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .feed-card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #e67e22;
        }
        .feed-card:active {
            transform: scale(0.99);
        }
        .card-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .type-story { background: #3498db; color: white; }
        .type-word { background: #9b59b6; color: white; }
        .type-lyrics { background: #e91e63; color: white; }
        .type-video { background: #f39c12; color: white; }
        .type-picture { background: #1abc9c; color: white; }
        
        .feed-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .snippet {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 10px 0;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.7rem;
            color: #7f8c8d;
        }
        .credit {
            font-size: 0.7rem;
            color: #16a085;
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px dashed #eee;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: white;
            max-width: 600px;
            margin: 50px auto;
            border-radius: 15px;
            padding: 25px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .close-modal:hover {
            color: #333;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin: 15px 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }
        .word-card-full {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 15px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }
        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
        }
        .delete-btn {
            background: #e74c3c;
            margin-top: 10px;
        }
        .admin-badge {
            background: #e74c3c;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 15px;
        }
        .help-text {
            font-size: 0.75rem;
            color: #7f8c8d;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        hr {
            margin: 20px 0;
        }
        @media (max-width: 600px) {
            .feed-card {
                padding: 15px;
            }
            .modal-content {
                padding: 20px;
                margin: 30px auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 My Creative Corner</h1>
            <p>Short Stories | Word of the Day | Lyrics | Videos | Pictures</p>
            <nav>
                <button id="home-btn" class="active" onclick="showHome()">🏠 Home Feed</button>
                <button onclick="showAdminPanel()">⚙️ Admin</button>
            </nav>
        </header>

        <!-- Home Feed Section -->
        <div id="home-feed" class="feed"></div>

        <!-- Admin Panel -->
        <div id="admin-panel" style="display:none;">
            <div id="admin-content"></div>
        </div>
        
        <!-- Modal for full content -->
        <div id="content-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
        
        <footer>
            <p>✨ Tap any card to read full content | Always credit original creators ✨</p>
        </footer>
    </div>

    <script>
        const ADMIN_PASSWORD = "perseverance2025";
        
        let stories = JSON.parse(localStorage.getItem('stories')) || [];
        let wordOfDay = JSON.parse(localStorage.getItem('wordOfDay')) || { 
            word: "Perseverance", 
            definition: "Steady persistence in a course of action, especially in spite of difficulties, obstacles, or discouragement." 
        };
        let lyrics = JSON.parse(localStorage.getItem('lyrics')) || [];
        let videos = JSON.parse(localStorage.getItem('videos')) || [];
        let pictures = JSON.parse(localStorage.getItem('pictures')) || [];
        let isAdminAuthenticated = false;
        
        // Build unified feed
        function buildFeed() {
            let feedItems = [];
            
            // Add word of the day
            feedItems.push({
                type: 'word',
                typeLabel: '📝 Word of the Day',
                typeClass: 'type-word',
                title: wordOfDay.word,
                snippet: wordOfDay.definition.substring(0, 120) + (wordOfDay.definition.length > 120 ? '...' : ''),
                fullData: wordOfDay,
                date: new Date().toLocaleDateString()
            });
            
            // Add stories
            stories.forEach(item => {
                feedItems.push({
                    type: 'story',
                    typeLabel: '📚 Short Story',
                    typeClass: 'type-story',
                    title: item.title,
                    snippet: (item.content || '').substring(0, 150) + ((item.content || '').length > 150 ? '...' : ''),
                    fullData: item,
                    date: item.date,
                    credit: item.credit
                });
            });
            
            // Add lyrics
            lyrics.forEach(item => {
                feedItems.push({
                    type: 'lyrics',
                    typeLabel: '🎵 Lyrics',
                    typeClass: 'type-lyrics',
                    title: item.song,
                    snippet: (item.lyrics || '').substring(0, 120) + ((item.lyrics || '').length > 120 ? '...' : ''),
                    fullData: item,
                    date: item.date,
                    credit: item.credit
                });
            });
            
            // Add videos
            videos.forEach(item => {
                feedItems.push({
                    type: 'video',
                    typeLabel: '🎬 Video',
                    typeClass: 'type-video',
                    title: item.title,
                    snippet: `Watch: ${item.title}`,
                    fullData: item,
                    date: item.date,
                    credit: item.credit,
                    url: item.url
                });
            });
            
            // Add pictures
            pictures.forEach(item => {
                feedItems.push({
                    type: 'picture',
                    typeLabel: '🖼️ Picture',
                    typeClass: 'type-picture',
                    title: item.title,
                    snippet: item.caption ? (item.caption.substring(0, 100) + (item.caption.length > 100 ? '...' : '')) : 'Tap to view image',
                    fullData: item,
                    date: item.date,
                    credit: item.credit,
                    imageUrl: item.imageUrl,
                    caption: item.caption
                });
            });
            
            // Sort by date (newest first) - put word of day at top always
            feedItems.sort((a, b) => {
                if(a.type === 'word') return -1;
                if(b.type === 'word') return 1;
                return new Date(b.date) - new Date(a.date);
            });
            
            return feedItems;
        }
        
        function displayHome() {
            const container = document.getElementById('home-feed');
            const feedItems = buildFeed();
            
            if(feedItems.length === 0) {
                container.innerHTML = '<div class="feed-card" style="text-align:center;">✨ Nothing yet. Go to Admin Panel to add your first content! ✨</div>';
                return;
            }
            
            container.innerHTML = feedItems.map((item, idx) => `
                <div class="feed-card" onclick="showFullContent(${idx})">
                    <span class="card-type ${item.typeClass}">${item.typeLabel}</span>
                    <h3>${escapeHtml(item.title)}</h3>
                    <div class="snippet">${escapeHtml(item.snippet)}</div>
                    <div class="card-footer">
                        <span>📅 ${item.date}</span>
                        <span>👆 Tap to read</span>
                    </div>
                    ${item.credit ? `<div class="credit">📌 Credit: ${escapeHtml(item.credit)}</div>` : ''}
                </div>
            `).join('');
            
            // Store feed items globally for modal access
            window.currentFeedItems = feedItems;
        }
        
        function showFullContent(index) {
            const item = window.currentFeedItems[index];
            const modal = document.getElementById('content-modal');
            const modalBody = document.getElementById('modal-body');
            
            let html = '';
            
            switch(item.type) {
                case 'word':
                    html = `
                        <div class="word-card-full">
                            <h2 style="font-size:2rem;">✨ ${escapeHtml(item.fullData.word)} ✨</h2>
                            <p style="margin-top:15px;">${escapeHtml(item.fullData.definition)}</p>
                        </div>
                    `;
                    break;
                    
                case 'story':
                    html = `
                        <h2>📖 ${escapeHtml(item.fullData.title)}</h2>
                        <div style="color:#7f8c8d; margin:10px 0;">📅 ${item.date}</div>
                        <p style="white-space:pre-wrap; line-height:1.8;">${escapeHtml(item.fullData.content)}</p>
                        ${item.credit ? `<div class="credit" style="margin-top:20px;">📌 Credit: ${escapeHtml(item.credit)}</div>` : ''}
                    `;
                    break;
                    
                case 'lyrics':
                    html = `
                        <h2>🎵 ${escapeHtml(item.fullData.song)}</h2>
                        <div style="color:#7f8c8d; margin:10px 0;">📅 ${item.date}</div>
                        <p style="white-space:pre-wrap; line-height:1.8; font-style:italic;">${escapeHtml(item.fullData.lyrics)}</p>
                        ${item.credit ? `<div class="credit" style="margin-top:20px;">🎼 Credit: ${escapeHtml(item.credit)}</div>` : ''}
                    `;
                    break;
                    
                case 'video':
                    const videoId = extractYouTubeId(item.fullData.url);
                    html = `
                        <h2>🎬 ${escapeHtml(item.fullData.title)}</h2>
                        <div style="color:#7f8c8d; margin:10px 0;">📅 ${item.date}</div>
                        ${videoId ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>` : '<p>❌ Invalid YouTube URL</p>'}
                        ${item.credit ? `<div class="credit" style="margin-top:20px;">📹 Credit: ${escapeHtml(item.credit)}</div>` : ''}
                    `;
                    break;
                    
                case 'picture':
                    html = `
                        <h2>🖼️ ${escapeHtml(item.fullData.title)}</h2>
                        <div style="color:#7f8c8d; margin:10px 0;">📅 ${item.date}</div>
                        ${item.fullData.imageUrl ? `<img src="${escapeHtml(item.fullData.imageUrl)}" alt="${escapeHtml(item.fullData.title)}">` : ''}
                        ${item.fullData.caption ? `<p style="white-space:pre-wrap; margin-top:15px; font-style:italic;">"${escapeHtml(item.fullData.caption)}"</p>` : ''}
                        ${item.credit ? `<div class="credit" style="margin-top:20px;">📸 Credit: ${escapeHtml(item.credit)}</div>` : ''}
                    `;
                    break;
            }
            
            // Add delete button if admin is logged in
            if(isAdminAuthenticated) {
                html += `<button class="delete-btn" onclick="deleteFromFeed('${item.type}', ${index})" style="margin-top:20px;">🗑️ Delete This Item</button>`;
            }
            
            modalBody.innerHTML = html;
            modal.style.display = 'block';
        }
        
        function deleteFromFeed(type, feedIndex) {
            if(!confirm('Delete this item permanently?')) return;
            
            const item = window.currentFeedItems[feedIndex];
            
            switch(type) {
                case 'story':
                    // Find and remove from stories array
                    const storyTitle = item.title;
                    const storyIndex = stories.findIndex(s => s.title === storyTitle && s.date === item.date);
                    if(storyIndex !== -1) stories.splice(storyIndex, 1);
                    break;
                case 'lyrics':
                    const lyricsIndex = lyrics.findIndex(l => l.song === item.title && l.date === item.date);
                    if(lyricsIndex !== -1) lyrics.splice(lyricsIndex, 1);
                    break;
                case 'video':
                    const videoIndex = videos.findIndex(v => v.title === item.title && v.date === item.date);
                    if(videoIndex !== -1) videos.splice(videoIndex, 1);
                    break;
                case 'picture':
                    const pictureIndex = pictures.findIndex(p => p.title === item.title && p.date === item.date);
                    if(pictureIndex !== -1) pictures.splice(pictureIndex, 1);
                    break;
                case 'word':
                    alert('Word of the Day cannot be deleted, but you can change it in Admin Panel.');
                    closeModal();
                    return;
            }
            
            saveAll();
            closeModal();
            displayHome();
            alert('✅ Deleted successfully!');
        }
        
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
        
        function showHome() {
            document.getElementById('home-feed').style.display = 'block';
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('home-btn').classList.add('active');
            displayHome();
        }
        
        function closeModal() {
            document.getElementById('content-modal').style.display = 'none';
        }
        
        // Admin functions
        function showAdminPanel() {
            if(isAdminAuthenticated) {
                displayAdminPanel();
                document.getElementById('home-feed').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('home-btn').classList.remove('active');
            } else {
                showPasswordPrompt();
            }
        }
        
        function showPasswordPrompt() {
            const adminDiv = document.getElementById('admin-content');
            adminDiv.innerHTML = `
                <div style="text-align:center; padding:30px;">
                    <h2>🔐 Admin Access</h2>
                    <p>Enter password to manage content:</p>
                    <input type="password" id="admin-password" placeholder="Enter password">
                    <br>
                    <button onclick="checkPassword()">Unlock Panel</button>
                </div>
            `;
            document.getElementById('home-feed').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('home-btn').classList.remove('active');
        }
        
        function checkPassword() {
            const password = document.getElementById('admin-password').value;
            if(password === ADMIN_PASSWORD) {
                isAdminAuthenticated = true;
                displayAdminPanel();
            } else {
                alert('❌ Incorrect password!');
                showHome();
            }
        }
        
        function disp
